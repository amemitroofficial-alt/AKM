<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

.container{
padding-top:60px;
width:90%;
max-width:500px;
margin:auto;
}

h1{
font-size:32px;
}

p{
color:#ccc;
font-size:18px;
}

input, textarea, select{
width:90%;
padding:16px;
margin-top:20px;
border:none;
border-radius:12px;
font-size:18px;
}

textarea{
height:180px;
resize:none;
}

button{
margin-top:30px;
padding:16px 34px;
background:orange;
color:white;
font-size:20px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Feedback & Suggestions ⭐</h1>

<p>We would love to hear from you</p>


<form
action="https://docs.google.com/forms/d/e/1FAIpQLSfx9vnFHuVqYBlAAnZ2V3adRs12g_HQdSeu9Q57Qkms7wCHEQ/formResponse"
method="POST"
target="hidden_iframe"
onsubmit="submitted=true;thankyou();"
>

<input
type="text"
name="entry.570567093"
placeholder="Enter Your Name"
required
>


<textarea
name="entry.2064258423"
placeholder="Write feedback or suggestions..."
required>
</textarea>


<select name="entry.2009331882">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>

<br>

<button type="submit">
Submit Feedback
</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<script>
function thankyou(){
setTimeout(function(){
alert("Thank You For Your Feedback 🙏");
},1000);
}
</script>

</body>
</html>
