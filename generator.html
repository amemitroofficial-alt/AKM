<!DOCTYPE html>
<html>
<head>
    <title>AKM - Welcome</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 60px;
            animation: zoom 1.5s ease;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.5;
        }

        .tagline {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .divider {
            margin: 40px auto;
            width: 85%;
            height: 1px;
            background: #555;
        }

        .sub-heading {
            font-size: 18px;
            font-weight: bold;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            background: orange;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #c97a00;
        }

        .btn:active {
            transform: scale(0.95);
        }

        input {
            margin-top: 20px;
            padding: 14px;
            width: 70%;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        /* 🔥 SEARCH BOX FIX */
        #searchBox {
            transition: all 0.3s ease;
        }

        .fixed-search {
            position: fixed;
            bottom: 10px;
            left: 5%;
            width: 90%;
            background: black;
            padding: 12px;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }

        .fixed-search input {
            width: 100%;
            margin: 0;
        }

        .fixed-search .btn {
            width: 100%;
            margin-top: 10px;
        }

        @keyframes zoom {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- TOP -->
    <div class="title">
        WELCOME TO <br>
        AME KALYAN MITRO GROUP
    </div>

    <div class="tagline">
        🙏 Nayi Soch, Purane Sanskar, Dharam, Seva Aur Ekta Ka Sangam 🙏
    </div>

    <!-- LINE -->
    <div class="divider"></div>

    <!-- IMAGE SECTION -->
    <div class="sub-heading">
        MAKE YOUR AKM IDENTITY ✨
    </div>

    <button class="btn" onclick="goToGenerator()">
        MAKE MY IMAGE ✨
    </button>

    <!-- LINE -->
    <div class="divider"></div>

    <!-- JIVDAYA SECTION -->
    <div class="section-title">
        OUR JIVDAYA ACTIVITY 🐄
    </div>

    <button class="btn" onclick="goToActivities()">
        SHOW ACTIVITIES
    </button>

    <!-- LINE -->
    <div class="divider"></div>

    <!-- DERASAR SECTION -->
    <div class="section-title">
        GET DIRECTIONS FOR DERASAR 📍
    </div>

    <div id="searchBox">
        <input 
            type="text" 
            id="derasar" 
            placeholder="Enter Derasar Name (e.g. Paldi Jain Derasar Ahmedabad)"
            onfocus="fixSearch()"
            onblur="resetSearch()"
        >

        <button class="btn" onclick="getDirections()">
            GET DIRECTIONS 📍
        </button>
    </div>

</div>

<script>
function goToGenerator() {
    window.location.href = "AKM Image Generator.html";
}

function goToActivities() {
    window.location.href = "activities.html";
}

// 📍 Google Maps Direction
function getDirections() {
    let place = document.getElementById("derasar").value;

    if (!place) {
        alert("Please enter a derasar name");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {

            let userLat = position.coords.latitude;
            let userLng = position.coords.longitude;

            let url = `https://www.google.com/maps/dir/${userLat},${userLng}/${encodeURIComponent(place)}`;

            window.open(url, "_blank");

        }, function() {
            let url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(place)}`;
            window.open(url, "_blank");
        });
    } else {
        alert("Geolocation not supported");
    }
}

// 🔥 Fix full search box above keyboard
function fixSearch() {
    document.getElementById("searchBox").classList.add("fixed-search");
}

// 🔥 Reset
function resetSearch() {
    document.getElementById("searchBox").classList.remove("fixed-search");
}
</script>

</body>
</html>
