<!DOCTYPE html>
<html>
<head>
    <title>AKM Image Generator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        /* 🔥 INTRO SCREEN */
        #intro {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
        }

        /* 🔥 STRONG ZOOM CONTENT */
        .intro-content {
            text-align: center;
            padding: 20px;
            animation: smoothZoom 3s ease forwards;
        }

        .title {
            font-size: 44px;
            font-weight: bold;
        }

        .tagline {
            margin-top: 20px;
            font-size: 18px;
            color: #444;
        }

        /* 🔥 IMPROVED ZOOM */
        @keyframes smoothZoom {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            60% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        /* 🔥 BUTTON STYLE */
        button {
            margin-top: 30px;
            font-size: 18px;
            padding: 14px 28px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: orange;
            color: white;
            box-shadow: 0 4px 0 #c97a00;
            transition: 0.2s;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c97a00;
        }

        /* 🔥 MAIN APP */
        #main {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .logo {
            width: 180px;
            margin-top: 20px;
        }

        .main-heading {
            font-size: 28px;
            font-weight: bold;
        }

        .sub-text {
            color: #555;
        }

        .container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 1200px;
        }

        .template {
            width: 100%;
        }

        .photo-box {
            position: absolute;
            top: 26%;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 30%;
            overflow: hidden;
            border-radius: 20px;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #preview-section {
            display: none;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
        }

        #downloadBtn {
            display: none;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
    <div class="intro-content">
        <div class="title">Ame Kalyan Mitro Team</div>

        <div class="tagline">
            🙏Nayi soch, purane sanskar, dharam, seva aur ekta ka sangam🙏
        </div>

        <button onclick="startApp()">Start</button>
    </div>
</div>

<!-- 🔥 MAIN -->
<div id="main">

    <img src="AKMLOGO2.png" class="logo">
    <div class="main-heading">AME KALYAN MITRO GROUP</div>
    <div class="sub-text">Upload your photo here</div>

    <input type="file" id="upload">
    <br>

    <div class="container">
        <img src="1000213951.png.png" class="template">

        <div class="photo-box">
            <img id="preview">
        </div>
    </div>

    <button onclick="generateImage()">Preview</button>

    <div id="preview-section">
        <canvas id="canvas"></canvas>
        <br>
        <button id="downloadBtn" onclick="downloadImage()">Download</button>
    </div>

</div>

<script>
function startApp() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
}

let uploadedImage = null;

document.getElementById("upload").onchange = function (e) {
    let reader = new FileReader();

    reader.onload = function () {
        uploadedImage = new Image();
        uploadedImage.src = reader.result;
        document.getElementById("preview").src = reader.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

function generateImage() {
    if (!uploadedImage) {
        alert("Upload image first!");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let template = new Image();
    template.src = "1000213951.png.png";

    template.onload = function () {

        canvas.width = template.width;
        canvas.height = template.height;

        ctx.drawImage(template, 0, 0);

        let img = new Image();
        img.src = uploadedImage.src;

        img.onload = function () {

            let realSize = template.width * 0.30;
            let x = (template.width / 2) - (realSize / 2);
            let y = template.height * 0.26;

            ctx.drawImage(img, 0, 0, img.width, img.height, x, y, realSize, realSize);

            document.getElementById("preview-section").style.display = "block";
            document.getElementById("downloadBtn").style.display = "inline-block";
        };
    };
}

function downloadImage() {
    let canvas = document.getElementById("canvas");

    let link = document.createElement("a");
    link.download = "AKM.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
