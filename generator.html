<!DOCTYPE html>
<html>
<head>
    <title>AKM - Welcome</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 60px;
            animation: zoom 1.5s ease;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.5;
        }

        .tagline {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .divider {
            margin: 40px auto;
            width: 85%;
            height: 1px;
            background: #555;
        }

        .sub-heading {
            font-size: 18px;
            font-weight: bold;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            background: orange;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #c97a00;
        }

        .btn:active {
            transform: scale(0.95);
        }

        @keyframes zoom {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- TOP -->
    <div class="title">
        WELCOME TO <br>
        AME KALYAN MITRO GROUP
    </div>

    <div class="tagline">
        🙏 Nayi soch, purane sanskar, dharam, seva aur ekta ka sangam 🙏
    </div>

    <!-- LINE -->
    <div class="divider"></div>

    <!-- IMAGE SECTION -->
    <div class="sub-heading">
        MAKE YOUR AKM IDENTITY ✨
    </div>

    <button class="btn" onclick="goToGenerator()">
        MAKE MY IMAGE ✨
    </button>

    <!-- LINE -->
    <div class="divider"></div>

    <!-- JIVDAYA SECTION -->
    <div class="section-title">
        OUR JIVDAYA ACTIVITY 🐄
    </div>

    <button class="btn" onclick="goToActivities()">
        SHOW ACTIVITIES
    </button>

</div>

<script>
function goToGenerator() {
    window.location.href = "AKM Image Generator.html";
}

function goToActivities() {
    window.location.href = "activities.html";
}
</script>

</body>
</html>
