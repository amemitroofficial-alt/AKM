<!DOCTYPE html>
<html>
<head>
    <title>AKM - Welcome</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 60px;
            animation: zoom 1.5s ease;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            line-height: 1.5;
        }

        .tagline {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .divider {
            margin: 40px auto;
            width: 85%;
            height: 1px;
            background: #555;
        }

        .sub-heading {
            font-size: 18px;
            font-weight: bold;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            background: orange;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #c97a00;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* POPUP */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            color: white;
            width: 80%;
            max-width: 300px;
        }

        .popup-box input {
            padding: 10px;
            width: 90%;
            border-radius: 6px;
            border: none;
            margin-top: 10px;
        }

        .popup-box button {
            margin-top: 15px;
            background: orange;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        @keyframes zoom {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">
        WELCOME TO <br>
        AME KALYAN MITRO GROUP
    </div>

    <div class="tagline">
        🙏 Nayi Soch, Purane Sanskar, Dharam, Seva Aur Ekta Ka Sangam 🙏
    </div>

    <div class="divider"></div>

    <div class="sub-heading">
        MAKE YOUR AKM IDENTITY ✨
    </div>

    <button class="btn" onclick="goToGenerator()">
        MAKE MY IMAGE ✨
    </button>

    <div class="divider"></div>

    <div class="section-title">
        OUR JIVDAYA ACTIVITY 🐄
    </div>

    <button class="btn" onclick="goToActivities()">
        SHOW ACTIVITIES
    </button>

    <div class="divider"></div>

    <div class="section-title">
        FIND DERASAR 📍
    </div>

    <button class="btn" onclick="openDerasarPage()">
        FIND MY DERASAR 📍
    </button>

    <div class="divider"></div>

    <div class="section-title">
        SPIN THE SEVA WHEEL 🎡
    </div>

    <button class="btn" onclick="openWheel()">
        SPIN NOW 🎡
    </button>

    <!-- ✅ HELP SECTION (CENTER + ORANGE) -->
    <div class="divider"></div>

    <div class="section-title">
        NEED HELP 💬
    </div>

    <button class="btn" onclick="openHelp()">
        NEED HELP 💬
    </button>

</div>

<!-- POPUP -->
<div id="helpPopup" class="popup">
    <div class="popup-box">
        <h3>Need Help?</h3>
        <input type="text" id="userName" placeholder="Enter your name">
        <button onclick="goWhatsApp()">Continue</button>
    </div>
</div>

<script>
function goToGenerator() {
    window.location.href = "AKM Image Generator.html";
}

function goToActivities() {
    window.location.href = "activities.html";
}

function openDerasarPage() {
    window.location.href = "derasar.html";
}

function openWheel() {
    window.location.href = "seva-wheel.html";
}

/* HELP FLOW */
function openHelp() {
    document.getElementById("helpPopup").style.display = "flex";
}

function goWhatsApp() {
    let name = document.getElementById("userName").value;

    if(name.trim() === "") {
        alert("Please enter your name");
        return;
    }

    let message = `Hello, my name is ${name}. I need help for Ame Kalyan Mitro.`;

    let url = "https://wa.me/919998143506?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
