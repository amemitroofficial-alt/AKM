<!DOCTYPE html>
<html>
<head>
    <title>AKM Image Generator</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
            margin-bottom: 100px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 🔙 BACK BUTTON */
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: black;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            z-index: 999;
        }

        .logo {
            width: 180px;
            margin-top: 20px;
        }

        .main-heading {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .sub-text {
            font-size: 16px;
            margin: 10px;
            color: #555;
        }

        .container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 1200px;
        }

        .template {
            width: 100%;
        }

        /* 🔥 PERFECT PHOTO POSITION */
        .photo-box {
            position: absolute;
            top: 26%;
            left: 50%;
            transform: translateX(-50%);
            width: 30%;
            height: 30%;
            overflow: hidden;
            border-radius: 20px;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        input {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .preview-btn {
            background: orange;
            color: white;
        }

        /* 🔥 FIXED DOWNLOAD BUTTON */
        .download-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: green;
            color: white;
            font-size: 18px;
            padding: 15px;
            font-weight: bold;
            z-index: 999;
        }

        .download-btn:active {
            background: darkgreen;
        }

        #preview-section {
            display: none;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
        }
    </style>
</head>

<body>

<!-- 🔙 BACK -->
<button class="back-btn" onclick="goBack()">⬅ Back</button>

<!-- 🔥 LOGO + NAME -->
<img src="AKMLOGO2.png" class="logo">
<div class="main-heading">AME KALYAN MITRO GROUP</div>
<div class="sub-text">Upload your photo here</div>

<input type="file" id="upload">
<br>

<button class="preview-btn" onclick="generateImage()">Preview</button>

<div class="container">
    <img id="template" src="1000213951.png.png" class="template">

    <div class="photo-box">
        <img id="preview">
    </div>
</div>

<div id="preview-section">
    <canvas id="canvas"></canvas>
</div>

<!-- 🔥 FIXED DOWNLOAD BUTTON -->
<button class="download-btn" onclick="downloadImage()">⬇ Download Image</button>

<script>
let uploadedImage = null;

document.getElementById("upload").onchange = function (e) {
    let reader = new FileReader();

    reader.onload = function () {
        uploadedImage = new Image();
        uploadedImage.src = reader.result;
        document.getElementById("preview").src = reader.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

function generateImage() {
    if (!uploadedImage) {
        alert("Upload image first!");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let template = new Image();
    template.src = "1000213951.png.png";

    template.onload = function () {

        canvas.width = template.width;
        canvas.height = template.height;

        ctx.drawImage(template, 0, 0);

        let img = new Image();
        img.src = uploadedImage.src;

        img.onload = function () {

            let topPercent = 0.26;
            let sizePercent = 0.30;

            let realSize = template.width * sizePercent;
            let x = (template.width / 2) - (realSize / 2);
            let y = template.height * topPercent;

            let imgRatio = img.width / img.height;
            let boxRatio = 1;

            let sx, sy, sWidth, sHeight;

            if (imgRatio > boxRatio) {
                sHeight = img.height;
                sWidth = img.height;
                sx = (img.width - sWidth) / 2;
                sy = 0;
            } else {
                sWidth = img.width;
                sHeight = img.width;
                sx = 0;
                sy = (img.height - sHeight) / 2;
            }

            ctx.drawImage(img, sx, sy, sWidth, sHeight, x, y, realSize, realSize);

            document.getElementById("preview-section").style.display = "block";
        };
    };
}

function downloadImage() {
    let canvas = document.getElementById("canvas");

    let link = document.createElement("a");
    link.download = "AKM.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
