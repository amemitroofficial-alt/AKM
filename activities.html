<!DOCTYPE html>
<html>
<head>
    <title>Jivdaya Activities - AKM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fffaf0;
            color: #3d2b00;
            text-align: center;
            scroll-behavior: smooth;
        }

        .container {
            padding: 20px 10px;
            margin-top: 60px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .divider {
            margin: 25px auto;
            width: 90%;
            height: 1px;
            background: #d8c08a;
        }

        .text {
            font-size: 15px;
            color: #5f4a1f;
            line-height: 1.6;
            padding: 0 10px;
        }

        .highlight {
            color: orange;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn {
            margin-top: 15px;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            background: green;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #appBox {
            display: none;
            margin-top: 30px;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #fff5dc;
            color: #3d2b00;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            border:1px solid #d8c08a;
        }

        #videoModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
        }

        #videoModal iframe {
            width: 100%;
            height: 60%;
            margin-top: 20%;
        }

        .closeBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 25px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<div class="container">

    <div class="title">
        OUR JIVDAYA ACTIVITY 🐄
    </div>

    <div style="margin-top: 20px;">
        <button class="btn" onclick="openActivity()">1st ACTIVITY 🎯</button>
    </div>

    <div class="divider"></div>

    <div class="text">
        દરરોજ ઘણા બેઝુબાન પ્રાણીઓ ભૂખ્યા અને લાચાર રહી જાય છે... 🐄
        <br><br>
        તમારું નાનું સહયોગ તેમને ખોરાક, સંભાળ અને વધુ સારી જિંદગી આપી શકે છે ❤️
    </div>

    <div class="highlight">
        માત્ર ₹10 પણ મોટો ફેરફાર લાવી શકે છે 🙏
    </div>

    <button class="btn" onclick="showApps()">DONATE NOW ❤️</button>

    <div id="appBox">
        <p>Choose Payment App 👇</p>

        <button class="btn" onclick="pay('gpay')">Google Pay</button>
        <button class="btn" onclick="pay('phonepe')">PhonePe</button>
        <button class="btn" onclick="pay('paytm')">Paytm</button>
    </div>

</div>

<div id="videoModal">
    <span class="closeBtn" onclick="closeVideo()">✖</span>
    <iframe 
        src="https://drive.google.com/file/d/102DuN_icJh0hcJo8zkixFQXypJJJ7UED/preview"
        allow="autoplay">
    </iframe>
</div>

<script>

function openActivity() {
    window.location.href = "1stactivity.html";
}

function openVideo() {
    document.getElementById("videoModal").style.display = "block";
}

function closeVideo() {
    document.getElementById("videoModal").style.display = "none";
}

function showApps() {
    let appBox = document.getElementById("appBox");
    appBox.style.display = "block";
    appBox.scrollIntoView({ behavior: "smooth", block: "center" });
}

function pay(app) {

    let note = encodeURIComponent("તમારું એક નાનું દાન, એક ભૂખ્યા જીવને આશા આપી શકે છે ❤️");
    let upi = "upi://pay?pa=9998143506@ybl&pn=AKM&tn=" + note;

    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        let msg = encodeURIComponent("I want to donate for Jivdaya 🙏");
        window.location.href = "https://wa.me/919998143506?text=" + msg;
        return;
    }

    if (/Android/i.test(navigator.userAgent)) {

        let url = "";

        if (app === "gpay") {
            url = "intent://pay?pa=9998143506@ybl&pn=AKM&tn=" + note + "#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end;";
        }

        else if (app === "phonepe") {
            url = "intent://pay?pa=9998143506@ybl&pn=AKM&tn=" + note + "#Intent;scheme=upi;package=com.phonepe.app;end;";
        }

        else if (app === "paytm") {
            url = "intent://pay?pa=9998143506@ybl&pn=AKM&tn=" + note + "#Intent;scheme=upi;package=net.one97.paytm;end;";
        }

        window.location.href = url;

        setTimeout(() => {
            window.location.href = upi;
        }, 1500);
    }

    else {
        alert("Please open this website on your phone to donate 🙏");
    }
}

function goBack() {
    window.history.back();
}
</script>

</body>
</html>
