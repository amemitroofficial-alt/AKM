<!DOCTYPE html>
<html>
<head>
    <title>Jivdaya Activities - AKM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 80px;
            animation: zoom 1.5s ease;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .coming {
            font-size: 22px;
            margin-top: 30px;
            color: orange;
        }

        .btn {
            margin-top: 40px;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            background: orange;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.95);
        }

        @keyframes zoom {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">
        OUR JIVDAYA ACTIVITY 🐄
    </div>

    <div class="coming">
        🚧 COMING SOON 🚧
    </div>

    <button class="btn" onclick="goBack()">
        ⬅ BACK
    </button>

</div>

<script>
function goBack() {
    window.location.href = "generator.html";
}
</script>

</body>
</html>
