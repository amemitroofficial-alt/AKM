<!DOCTYPE html>
<html>
<head>
    <title>1st Activity - AKM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn {
            margin-top: 20px;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            background: green;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        /* VIDEO BOX */
        #videoBox {
            display: none;
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">
        OUR FIRST ACTIVITY 🐄
    </div>

    <!-- WATCH VIDEO BUTTON -->
    <button class="btn" onclick="startVideo()">WATCH VIDEO 🎥</button>

    <!-- VIDEO -->
    <div id="videoBox">
        <iframe 
            id="videoFrame"
            src=""
            allow="autoplay">
        </iframe>
    </div>

</div>

<script>
function startVideo() {
    document.getElementById("videoBox").style.display = "block";

    // video load on click
    document.getElementById("videoFrame").src =
    "https://drive.google.com/file/d/102DuN_icJh0hcJo8zkixFQXypJJJ7UED/preview";
}
</script>

</body>
</html>
