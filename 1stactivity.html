<!DOCTYPE html>
<html>
<head>
    <title>1st Activity - AKM</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 15px;
            color: #ddd;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.6;
            padding: 0 10px;
        }

        .highlight {
            color: orange;
            font-weight: 600;
        }

        .btn {
            margin-top: 20px;
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            background: green;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        /* 🔥 FULLSCREEN VIDEO */
        #videoModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CLOSE BUTTON */
        .closeBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 28px;
            color: white;
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">
        OUR FIRST ACTIVITY 🐄
    </div>

    <div class="sub-title">
        મહાવીર જન્મ કલ્યાણક નિમિત્તે 
        <span class="highlight">JYMS FOUNDATION</span> દ્વારા લાડુ વિતરણ દરમિયાન વધેલા લાડુઓને 
        <span class="highlight">AME KALYAN MITRO GROUP</span> દ્વારા વડોદરા પાંજરાપોળમાં ગાયોને ખવડાવવામાં આવ્યા — 
        આ અમારી પ્રથમ જીવદયા પ્રવૃત્તિ હતી.
    </div>

    <button class="btn" onclick="openVideo()">WATCH VIDEO 🎥</button>

</div>

<!-- 🔥 VIDEO MODAL -->
<div id="videoModal">
    <span class="closeBtn" onclick="closeVideo()">✖</span>

    <video id="videoPlayer" controls autoplay muted playsinline>
        <source src="https://raw.githubusercontent.com/amemitroofficial-alt/AKM/main/jivdaya.mp4" type="video/mp4">
    </video>
</div>

<script>
function openVideo() {
    let modal = document.getElementById("videoModal");
    let video = document.getElementById("videoPlayer");

    modal.style.display = "block";
    video.play().catch(() => {});
}

function closeVideo() {
    let video = document.getElementById("videoPlayer");

    video.pause();
    video.currentTime = 0;

    document.getElementById("videoModal").style.display = "none";
}
</script>

</body>
</html>
