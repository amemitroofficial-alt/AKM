<!DOCTYPE html>
<html>
<head>
    <title>1st Activity - AKM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
        }

        .sub-title {
            font-size: 15px;
            color: #ddd;
            margin: 15px 0;
            line-height: 1.6;
        }

        .highlight {
            color: orange;
            font-weight: 600;
        }

        .btn {
            padding: 14px 25px;
            font-size: 16px;
            font-weight: bold;
            background: green;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin: 10px;
        }

        /* BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: black;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        /* FULLSCREEN MODAL */
        #videoModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 999;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .closeBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: white;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="goBack()">← Back</button>

<div class="container">

    <div class="title">OUR FIRST ACTIVITY 🐄</div>

    <div class="sub-title">
        મહાવીર જન્મ કલ્યાણક નિમિત્તે 
        <span class="highlight">JYMS FOUNDATION</span> દ્વારા લાડુ વિતરણ દરમિયાન વધેલા લાડુઓને 
        <span class="highlight">AME KALYAN MITRO GROUP</span> દ્વારા વડોદરા પાંજરાપોળમાં ગાયોને ખવડાવવામાં આવ્યા —
        આ અમારી પ્રથમ જીવદયા પ્રવૃત્તિ હતી.
    </div>

    <!-- FIRST VIDEO BUTTON -->
    <button class="btn" onclick="openVideo1()">WATCH 1st VIDEO 🎥</button>

    <!-- SECOND VIDEO BUTTON -->
    <button class="btn" onclick="openVideo2()">WATCH 2nd VIDEO 🎥</button>

</div>

<!-- VIDEO MODAL -->
<div id="videoModal">
    <span class="closeBtn" onclick="closeVideo()">✖</span>

    <iframe id="videoFrame"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>

<script>
function openVideo1() {
    document.getElementById("videoModal").style.display = "block";

    document.getElementById("videoFrame").src =
    "https://player.cloudinary.com/embed/?cloud_name=dgexmrayo&public_id=Jivdaya_w1zwrs&autoplay=true&muted=true";
}

function openVideo2() {
    document.getElementById("videoModal").style.display = "block";

    document.getElementById("videoFrame").src =
    "https://player.cloudinary.com/embed/?cloud_name=dgexmrayo&public_id=2nd_y39ejh&autoplay=true&muted=true";
}

function closeVideo() {
    document.getElementById("videoModal").style.display = "none";
    document.getElementById("videoFrame").src = "";
}

/* BACK FUNCTION */
function goBack() {
    window.history.back();
}
</script>

</body>
</html>
