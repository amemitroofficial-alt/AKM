<!DOCTYPE html>
<html>
<head>
    <title>Find Derasar</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 80px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
        }

        input {
            margin-top: 30px;
            padding: 16px;
            width: 80%;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }

        .btn {
            margin-top: 20px;
            padding: 16px 30px;
            font-size: 18px;
            font-weight: bold;
            background: orange;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #c97a00;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="back" onclick="goBack()">⬅ Back</div>

<div class="container">

    <div class="title">
        FIND DERASAR 📍
    </div>

    <input 
        type="text" 
        id="derasar" 
        placeholder="Enter Derasar Name (e.g. Paldi Jain Derasar Ahmedabad)"
    >

    <br>

    <button class="btn" onclick="getDirections()">
        GET DIRECTIONS 📍
    </button>

</div>

<script>
function goBack() {
    window.history.back();
}

function getDirections() {
    let place = document.getElementById("derasar").value;

    if (!place) {
        alert("Please enter a derasar name");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {

            let userLat = position.coords.latitude;
            let userLng = position.coords.longitude;

            let url = `https://www.google.com/maps/dir/${userLat},${userLng}/${encodeURIComponent(place)}`;

            window.open(url, "_blank");

        }, function() {
            let url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(place)}`;
            window.open(url, "_blank");
        });
    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
