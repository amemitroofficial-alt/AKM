<!DOCTYPE html>
<html>
<head>
    <title>Welcome - AKM</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            overflow: hidden;
        }

        /* 🔥 ZOOM OUT */
        .zoom-container {
            width: 100%;
            height: 100vh;
            background: url('1000213950.png') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: zoomOut 1.5s ease forwards;
        }

        @keyframes zoomOut {
            from { transform: scale(1.4); }
            to { transform: scale(1); }
        }

        /* 🔥 CENTER CARD */
        .card {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            width: 80%;
            max-width: 350px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* 🔥 BIG BUTTON WITH LOGO */
        .start-btn {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: url('logo.jpeg') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .start-btn span {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 8px;
        }

        .start-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

<div class="zoom-container">
    <div class="card">

        <div class="title">
            AME KALYAN<br>MITRO GROUP
        </div>

        <!-- 🔥 LOGO BUTTON -->
        <button class="start-btn" onclick="startApp()">
            <span>START</span>
        </button>

    </div>
</div>

<script>
function startApp() {
    window.location.href = "generator.html";
}
</script>

</body>
</html>
