<!DOCTYPE html>
<html>
<head>
    <title>AKM Image</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 1200px;
        }

        /* TEMPLATE */
        .template {
            width: 100%;
        }

        /* 🔥 RESPONSIVE PHOTO BOX */
        .photo-box {
            position: absolute;
            top: 28%;   /* 🔥 responsive */
            left: 50%;
            transform: translateX(-50%);
            width: 28%;  /* 🔥 responsive */
            height: 28%;
            overflow: hidden;
            border-radius: 20px;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        input, button {
            margin: 15px;
            padding: 10px 20px;
            font-size: 16px;
        }

        button {
            background: orange;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

<h2>Upload Your Photo</h2>

<input type="file" id="upload">
<br>

<button onclick="downloadImage()">Download Image</button>

<br><br>

<div class="container" id="capture">
    <img id="template" src="1000213950.png" class="template">

    <div class="photo-box">
        <img id="preview">
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let uploadedImage = null;

document.getElementById("upload").onchange = function (e) {
    let reader = new FileReader();

    reader.onload = function () {
        uploadedImage = new Image();
        uploadedImage.src = reader.result;
        document.getElementById("preview").src = reader.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

function downloadImage() {
    if (!uploadedImage) {
        alert("Pehle image upload karo!");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let template = document.getElementById("template");

    let originalWidth = template.naturalWidth;
    let originalHeight = template.naturalHeight;

    canvas.width = originalWidth;
    canvas.height = originalHeight;

    // draw template
    ctx.drawImage(template, 0, 0);

    let img = new Image();
    img.src = uploadedImage.src;

    img.onload = function () {

        // 🔥 RESPONSIVE VALUES (MATCH CSS)
        let topPercent = 0.28;
        let sizePercent = 0.28;

        let realSize = originalWidth * sizePercent;
        let x = (originalWidth / 2) - (realSize / 2);
        let y = originalHeight * topPercent;

        // 🔥 NO STRETCH (COVER)
        let imgRatio = img.width / img.height;
        let boxRatio = 1;

        let sx, sy, sWidth, sHeight;

        if (imgRatio > boxRatio) {
            sHeight = img.height;
            sWidth = img.height * boxRatio;
            sx = (img.width - sWidth) / 2;
            sy = 0;
        } else {
            sWidth = img.width;
            sHeight = img.width / boxRatio;
            sx = 0;
            sy = (img.height - sHeight) / 2;
        }

        ctx.drawImage(
            img,
            sx, sy, sWidth, sHeight,
            x, y, realSize, realSize
        );

        let link = document.createElement("a");
        link.download = "AKM.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    };
}
</script>

</body>
</html>
