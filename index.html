<!DOCTYPE html>
<html>
<head>
    <title>AKM Image Generator</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }

        /* 🔥 BIG LOGO (TEXT SIZE MATCH) */
        .logo {
            width: 190px;   /* 🔥 FINAL SIZE */
            margin-top: 20px;
        }

        /* 🔥 HEADING */
        .main-heading {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }

        .sub-text {
            font-size: 18px;
            margin: 10px;
            color: #555;
        }

        .container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 1200px;
        }

        .template {
            width: 100%;
        }

        /* 🔥 BIG PHOTO */
        .photo-box {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 38%;
            height: 38%;
            overflow: hidden;
            border-radius: 20px;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        input, button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }

        button {
            background: orange;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: darkorange;
        }

        #preview-section {
            display: none;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
        }
    </style>
</head>

<body>

<!-- 🔥 BIG LOGO -->
<img src="logo.jpeg" class="logo">

<!-- 🔥 NAME -->
<div class="main-heading">AME KALYAN MITRO GROUP</div>

<div class="sub-text">Upload your photo here</div>

<input type="file" id="upload">
<br>

<button onclick="generateImage()">Preview</button>

<div class="container">
    <img id="template" src="1000213950.png" class="template">

    <div class="photo-box">
        <img id="preview">
    </div>
</div>

<div id="preview-section">
    <h3>Preview</h3>
    <canvas id="canvas"></canvas>
    <br>
    <button onclick="downloadImage()">Download Image</button>
</div>

<script>
let uploadedImage = null;

document.getElementById("upload").onchange = function (e) {
    let reader = new FileReader();

    reader.onload = function () {
        uploadedImage = new Image();
        uploadedImage.src = reader.result;
        document.getElementById("preview").src = reader.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

function generateImage() {
    if (!uploadedImage) {
        alert("Pehle image upload karo!");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let template = document.getElementById("template");

    let originalWidth = template.naturalWidth;
    let originalHeight = template.naturalHeight;

    canvas.width = originalWidth;
    canvas.height = originalHeight;

    ctx.drawImage(template, 0, 0);

    let img = new Image();
    img.src = uploadedImage.src;

    img.onload = function () {

        let topPercent = 0.30;
        let sizePercent = 0.38;

        let realSize = originalWidth * sizePercent;
        let x = (originalWidth / 2) - (realSize / 2);
        let y = originalHeight * topPercent;

        let imgRatio = img.width / img.height;
        let boxRatio = 1;

        let sx, sy, sWidth, sHeight;

        if (imgRatio > boxRatio) {
            sHeight = img.height;
            sWidth = img.height * boxRatio;
            sx = (img.width - sWidth) / 2;
            sy = 0;
        } else {
            sWidth = img.width;
            sHeight = img.width / boxRatio;
            sx = 0;
            sy = (img.height - sHeight) / 2;
        }

        ctx.drawImage(
            img,
            sx, sy, sWidth, sHeight,
            x, y, realSize, realSize
        );

        document.getElementById("preview-section").style.display = "block";
    };
}

function downloadImage() {
    let canvas = document.getElementById("canvas");

    let link = document.createElement("a");
    link.download = "AKM.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
