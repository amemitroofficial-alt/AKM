<!DOCTYPE html>
<html>
<head>
    <title>AKM Image</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        .template {
            width: 900px;
        }

        /* 🔥 IMAGE BOX (PREVIEW) */
        .photo-box {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            height: 260px;
            overflow: hidden;
            border-radius: 20px;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        input, button {
            margin: 15px;
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h2>Upload Your Photo</h2>

<input type="file" id="upload">
<br>

<button onclick="downloadImage()">Download Image</button>

<br><br>

<div class="container">
    <!-- TEMPLATE -->
    <img id="template" src="{{ url_for('static', filename='template.png') }}" class="template">

    <!-- PREVIEW -->
    <div class="photo-box">
        <img id="preview">
    </div>
</div>

<!-- hidden canvas -->
<canvas id="canvas" style="display:none;"></canvas>

<script>
let uploadedImage = null;

document.getElementById("upload").onchange = function (e) {
    let reader = new FileReader();

    reader.onload = function () {
        uploadedImage = new Image();
        uploadedImage.src = reader.result;
        document.getElementById("preview").src = reader.result;
    };

    reader.readAsDataURL(e.target.files[0]);
};

function downloadImage() {
    if (!uploadedImage) {
        alert("Pehle image upload karo!");
        return;
    }

    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    let template = document.getElementById("template");

    let originalWidth = template.naturalWidth;
    let originalHeight = template.naturalHeight;

    canvas.width = originalWidth;
    canvas.height = originalHeight;

    // draw template
    ctx.drawImage(template, 0, 0);

    let img = new Image();
    img.src = uploadedImage.src;

    img.onload = function () {

        // 🔥 SCALE FIX
        let scaleX = originalWidth / template.width;
        let scaleY = originalHeight / template.height;

        // CSS values
        let cssTop = 160;
        let cssSize = 260;

        // convert to real pixels
        let realSize = cssSize * scaleX;
        let x = (originalWidth / 2) - (realSize / 2);
        let y = cssTop * scaleY;

        ctx.drawImage(img, x, y, realSize, realSize);

        // download
        let link = document.createElement("a");
        link.download = "AKM.png";
        link.href = canvas.toDataURL();
        link.click();
    };
}
</script>

</body>
</html>
