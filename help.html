<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Help - Ame Kalyan Mitro</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: gray;
            margin-bottom: 30px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .whatsapp-btn:hover {
            background: #1ebe5d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Need Help?</h1>
    <p>Click below to chat with us on WhatsApp</p>

    <button class="whatsapp-btn" onclick="openWhatsApp()">
        Chat on WhatsApp
    </button>
</div>

<script>
function openWhatsApp() {
    let name = localStorage.getItem("username");

    if (!name) {
        name = prompt("Please enter your name:");
        if (name) {
            localStorage.setItem("username", name);
        } else {
            name = "User";
        }
    }

    let message = `Hello, my name is ${name} and I need help for Ame Kalyan Mitro`;
    let url = "https://wa.me/919998143506?text=" + encodeURIComponent(message);

    window.open(url, "_blank");
}
</script>

</body>
</html>
