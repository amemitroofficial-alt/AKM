<!DOCTYPE html>
<html>
<head>
    <title>Help Popup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        #helpModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #111;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            overflow: hidden; /* important */
        }

        /* 🔥 HEADER (FIX) */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .close-btn {
            cursor: pointer;
            font-size: 20px;
        }

        .modal-body {
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            background: orange;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
    </style>
</head>

<body>

<div id="helpModal">

    <div class="modal-box">

        <!-- ✅ HEADER WITH CLOSE -->
        <div class="modal-header">
            <span>Need Help?</span>
            <span class="close-btn" onclick="closeHelp()">✖</span>
        </div>

        <div class="modal-body">

            <input type="text" id="nameInput" placeholder="Enter your name">

            <br>

            <button onclick="goToWhatsApp()">Continue</button>

        </div>

    </div>

</div>

<script>
function closeHelp() {
    document.getElementById("helpModal").style.display = "none";
}

function goToWhatsApp() {
    let name = document.getElementById("nameInput").value;

    if (!name) {
        alert("Please enter your name");
        return;
    }

    let msg = "Hello, my name is " + name + ", I want to help for Ame Kalyan Mitro";
    let url = "https://wa.me/919998143506?text=" + encodeURIComponent(msg);

    window.open(url, "_blank");
}
</script>

</body>
</html>
