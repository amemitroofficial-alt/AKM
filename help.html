<div id="helpModal" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
">

    <div style="
        background: #111;
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 350px;
        position: relative;
        text-align: center;
    ">

        <!-- ❌ CLOSE BUTTON -->
        <span onclick="closeHelp()" style="
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            cursor: pointer;
            color: white;
        ">❌</span>

        <h3>Need Help?</h3>

        <input type="text" placeholder="Enter your name" style="
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 15px 0;
        ">

        <br>

        <button style="
            background: orange;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        ">
            Continue
        </button>

    </div>
</div>

<script>
function closeHelp() {
    document.getElementById("helpModal").style.display = "none";
}
</script>
