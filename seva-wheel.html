<!DOCTYPE html>
<html>
<head>
    <title>Spin the Seva Wheel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🎉 Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        .container {
            padding-top: 50px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .arrow {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid red;
            margin: auto;
            filter: drop-shadow(0 0 6px red);
        }

        canvas {
            margin-top: 10px;
        }

        .btn {
            margin-top: 15px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            background: orange;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #c97a00;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🎡 Spin the Seva Wheel</h2>

    <div class="arrow"></div>

    <canvas id="wheel" width="300" height="300"></canvas>

    <br>

    <button class="btn" onclick="spinWheel()">SPIN NOW</button>

    <div class="result" id="result"></div>

    <button class="btn" onclick="shareSeva()">SHARE ON WHATSAPP 📲</button>
    <button class="btn" onclick="completeSeva()">I COMPLETED THIS SEVA ✅</button>

</div>

<script>
const options = [
    "🙏 Darshan Karo",
    "💧 Paani Pilao",
    "🐄 Jivdaya Karo",
    "📿 5 Min Prayer",
    "😊 Smile Spread Karo",
    "🤝 Help Someone"
];

const colors = ["#ff5733","#33ff57","#3357ff","#ff33a8","#ffd633","#33fff2"];

let startAngle = 0;
let spinTimeout = null;
let spinAngleStart = 0;
let spinTime = 0;
let spinTimeTotal = 0;

const ctx = document.getElementById("wheel").getContext("2d");

function drawWheel() {
    const arc = Math.PI / (options.length / 2);

    ctx.clearRect(0,0,300,300);

    for (let i = 0; i < options.length; i++) {
        const angle = startAngle + i * arc;
        ctx.fillStyle = colors[i];

        ctx.beginPath();
        ctx.arc(150, 150, 150, angle, angle + arc);
        ctx.arc(150, 150, 0, angle + arc, angle, true);
        ctx.fill();

        ctx.save();
        ctx.fillStyle = "white";
        ctx.translate(150, 150);
        ctx.rotate(angle + arc / 2);

        ctx.font = "bold 14px Arial";
        ctx.shadowColor = "black";
        ctx.shadowBlur = 4;

        ctx.fillText(options[i], 40, 5);

        ctx.restore();
    }
}

function spinWheel() {
    spinAngleStart = Math.random() * 20 + 20;
    spinTime = 0;
    spinTimeTotal = Math.random() * 3000 + 4000;
    rotateWheel();
}

function rotateWheel() {
    spinTime += 30;

    if (spinTime >= spinTimeTotal) {
        stopRotateWheel();
        return;
    }

    const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
    startAngle += (spinAngle * Math.PI / 180);
    drawWheel();

    spinTimeout = setTimeout(rotateWheel, 30);
}

function stopRotateWheel() {
    clearTimeout(spinTimeout);

    const degrees = startAngle * 180 / Math.PI + 90;
    const arcd = 360 / options.length;
    const index = Math.floor((360 - degrees % 360) / arcd);

    document.getElementById("result").innerText = options[index];
}

// 📲 SHARE
function shareSeva() {
    let text = document.getElementById("result").innerText;

    if (!text) {
        alert("Spin first!");
        return;
    }

    let msg = `I got this seva from AKM 🎡\n${text} 🙏\nTry now: https://yourwebsite.com`;

    window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

// 🎉 COMPLETE + CONFETTI
function completeSeva() {
    let text = document.getElementById("result").innerText;

    if (!text) {
        alert("Spin first!");
        return;
    }

    // 🎉 Confetti burst
    confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
    });

    alert("🙏 Amazing! You completed your seva.");
}

function easeOut(t, b, c, d) {
    const ts = (t /= d) * t;
    const tc = ts * t;
    return b + c * (tc + -3 * ts + 3 * t);
}

drawWheel();
</script>

</body>
</html>
